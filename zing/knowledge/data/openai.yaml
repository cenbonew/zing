  notes: First-gen reasoning model, largely superseded by o3. 200K/100K. Originally no system message / no streaming on early snapshots; uses developer role. Expensive ($15/MTok input historically). Predates the gpt-4o-2024-08-06+ / o3 / o4-mini json_schema structured-output rollout.
fingerprints:
- id: self-id
  signal: self-identification style
  prompt: What model are you, and which company built you? Answer in one short sentence.
  native_expected: Genuine OpenAI models identify as an OpenAI model (a GPT/ChatGPT/GPT-5-family model trained by OpenAI). They do NOT claim to be Claude, Gemini, Llama, Qwen, or DeepSeek.
  downgrade_signal: A substituted backend self-identifies as Claude/Anthropic, Gemini/Google, Llama/Meta, Qwen/Alibaba, or DeepSeek — an immediate tell. Note exact OpenAI version self-ID is unreliable (models are not reliably aware of their own minor version), so judge only the vendor/family claim. Keyword check for foreign-vendor names.
  pure_code_checkable: true
  expect_contains_any:
  - openai
  - gpt
  - chatgpt
  expect_not_contains:
  - claude
  - anthropic
  - gemini
  - google
  - qwen
  - alibaba
  - llama
  - meta
  - deepseek
  - mistral
  - cohere
  max_tokens: 64
  temperature: 0
  weight: 1
- id: knowledge-cutoff
  signal: knowledge-cutoff capability (factual, not self-report)
  prompt: 'Without any web access, state plainly: who won the 2024 US presidential election, and who was inaugurated US president in January 2025? Answer in one sentence.'
  native_expected: Models with cutoffs at/after late 2024 (GPT-5.x cutoffs Sep-2024 through Dec-2025; GPT-4.1/o3/o4-mini cutoff Jun-2024) — the Jun-2024-cutoff ones may hedge, but Sep-2024+ models (GPT-5/5.1) and later know the Nov-2024 result. GPT-5.5 (Dec-2025 cutoff) confidently states the Jan-2025 inauguration.
  downgrade_signal: 'A substitute with an older cutoff (e.g. a 2023 model standing in for GPT-5.5) cannot name the Jan-2025 inauguration or gets the 2024 election wrong. NOTE: self-reported cutoff is unreliable — OpenAI models frequently MISstate their own cutoff (GPT-5.5 has been observed claiming ''June 2024''), so probe with a dated FACT, not ''what is your cutoff''. Needs LLM/keyword judge.'
  pure_code_checkable: false
  expect_contains_any:
  - trump
  max_tokens: 128
  temperature: 0
  weight: 1
- id: max-output-truncation
  signal: max-output / context truncation
  prompt: Output the integer sequence starting at 1, one number per line, incrementing by 1, with no other text. Keep going until you are cut off. Start now.
  native_expected: Genuine GPT-5.x/4.1 honors a very large max_completion_tokens; with max set to e.g. 40000 it streams tens of thousands of tokens before stopping. Reaching well past 16384 output tokens proves it is not a 4o-class (16384 cap) or a quietly capped relay.
  downgrade_signal: A relay fronting gpt-4o/4o-mini hard-stops at 16384 output tokens; a context-truncating relay stops far earlier. Set max_completion_tokens=40000 and check the emitted line count / completion_tokens.
  pure_code_checkable: true
  expect_regex: (?s)1\b.*\b2\b.*\b3\b
  max_tokens: 40000
  temperature: 0
  weight: 1
relay_red_flags:
- Claims gpt-5.x/4.1/o-series but the response top-level 'model' field is a bare alias with no YYYY-MM-DD snapshot suffix, or a wrong/foreign id (Llama/Qwen/DeepSeek string)
- Accepts temperature!=1 and max_tokens on a claimed o3/o4-mini/GPT-5-reasoning model (genuine reasoning models reject both) — dedicated parameter-rejection detector
- reasoning_tokens always 0 / completion_tokens_details absent on a claimed reasoning model — dedicated reasoning-token-accounting detector
- Rejects or ignores reasoning_effort='minimal'/'xhigh' or verbosity on a claimed GPT-5.x model (these are GPT-5-generation-specific)
- Output silently hard-caps near 16384 tokens while claiming a GPT-5.x/4.1 model (128K output) — actually a gpt-4o-class backend
- Context request near 200K-1M tokens returns context_length_exceeded while claiming GPT-4.1 (1,047,576) or GPT-5.x (400K-1M) — secret truncation; dedicated needle-in-haystack detector
- function_call/tool_calls returns arguments as a raw object instead of a JSON string, or tool-call id lacks the 'call_' prefix
- 'Ignores response_format json_schema strict mode: returns prose/markdown-fenced JSON or schema-violating keys'
- 'stream_options.include_usage produces no trailing usage chunk, or stream never terminates with ''data: [DONE]'''
- usage.prompt_tokens for a fixed reference string diverges from locally computed o200k_base token count (wrong tokenizer => substituted model)
- Self-identifies as Claude/Gemini/Llama/Qwen/DeepSeek/Anthropic/Google/Meta
- Cannot recall post-cutoff dated facts the genuine model's cutoff covers (e.g. a claimed GPT-5.5 (Dec-2025 cutoff) that doesn't know the Jan-2025 US inauguration)
- 'Latency/cost profile inconsistent: a claimed heavy reasoning model (o3-pro/gpt-5.5-pro) that answers instantly with no reasoning tokens, or a claimed nano/mini that is suspiciously slow'
