fingerprints:
- id: self-id-zh
  signal: self-identification (bilingual)
  prompt: 你是谁？你的名字、开发公司和模型系列是什么？请用一句话回答。
  native_expected: Identifies as 通义千问 / Qwen, developed by 阿里云 / 阿里巴巴 (Alibaba Cloud / Alibaba Group / Tongyi Lab). Chinese reply is fluent and natural (Qwen is China-first, strong zh).
  downgrade_signal: Claims to be ChatGPT/GPT/OpenAI, Claude/Anthropic, Gemini/Google, DeepSeek, or a generic 'AI assistant' with no Alibaba/Qwen mention; or produces stilted/over-literal Chinese typical of a non-China-first model.
  pure_code_checkable: true
  expect_contains_any:
  - 通义千问
  - 通义
  - Qwen
  - qwen
  - Tongyi
  expect_not_contains:
  - ChatGPT
  - GPT
  - OpenAI
  - Claude
  - Anthropic
  - Gemini
  - DeepSeek
  max_tokens: 128
  temperature: 0
  weight: 1
- id: self-id-en
  signal: self-identification (English)
  prompt: 'Reply with EXACTLY one line in the format: NAME=<your model name>; MAKER=<company>. No other text.'
  native_expected: NAME contains 'Qwen' (or 'Tongyi'/'通义千问'); MAKER contains 'Alibaba'.
  downgrade_signal: NAME/MAKER references OpenAI/GPT, Anthropic/Claude, Google/Gemini, Mistral, Meta/Llama, or DeepSeek.
  pure_code_checkable: true
  expect_contains_any:
  - Qwen
  - qwen
  - Tongyi
  - 通义千问
  expect_not_contains:
  - OpenAI
  - GPT
  - Anthropic
  - Claude
  - Google
  - Gemini
  - Mistral
  - Llama
  - DeepSeek
  expect_regex: (?i)maker\s*=\s*[^;]*alibaba
  max_tokens: 64
  temperature: 0
  weight: 1
- id: max-output-ceiling
  signal: true max-output-length (context/output ceiling)
  prompt: 'Output the integer sequence starting at 1, one number per line, with NO commentary, and do not stop until you are cut off. Begin: 1'
  native_expected: For qwen3-coder/qwen3.5/qwen3.7-max should stream tens of thousands of lines (max_output up to 65536 tok). For the 2.5-gen qwen-max it caps near 8192 tokens; for qwen-turbo near 16384. Check the reported usage.completion_tokens against the claimed model's native max_output.
  downgrade_signal: A relay claiming qwen3.5/qwen3-coder (65536 max) but truncating completion_tokens at ~8192 or ~16384 is likely serving qwen-max-2.5 or qwen-turbo underneath. Conversely a tiny model may stop early or loop/repeat.
  pure_code_checkable: true
  max_tokens: 65536
  temperature: 0
  weight: 1
- id: zh-cultural-recall
  signal: Chinese-language and cultural factual recall (size/identity tell)
  prompt: 用中文回答，每行一个：(1) 通义千问由哪家公司开发？(2)《红楼梦》的作者是谁？(3) 二十四节气中‘惊蛰’的下一个节气是什么？只给答案。
  native_expected: 阿里巴巴/阿里云；曹雪芹（高鹗续）；春分。Strong China-centric knowledge, idiomatic Chinese.
  downgrade_signal: Wrong company (esp. naming OpenAI/Google), errors on 节气 ordering, or markedly non-native Chinese phrasing — typical of a Western model substituted behind a Qwen label.
  pure_code_checkable: true
  expect_contains_any:
  - 阿里巴巴
  - 阿里云
  expect_contains:
  - 曹雪芹
  - 春分
  expect_not_contains:
  - OpenAI
  - Google
  max_tokens: 128
  temperature: 0
  weight: 1
- id: tokenizer-special-token-echo
  signal: tokenizer artifact / special-token handling
  prompt: 'Repeat this verbatim including any special markers: <|im_start|>assistant Hello<|im_end|> and then on a new line write DONE.'
  native_expected: Qwen uses tiktoken-based BPE (vocab ~151,936) with <|im_start|>/<|im_end|>/<|endoftext|> as control tokens. Native serving may strip/normalize these chat-template markers oddly or refuse to echo them cleanly because they are reserved control tokens; behavior is consistent with the Qwen ChatML template.
  downgrade_signal: A backend with a different tokenizer (e.g. GPT o200k, Llama SentencePiece) echoes <|im_start|>/<|im_end|> as ordinary text with no special handling, or tokenizes CJK very differently (observable via usage.prompt_tokens on a fixed Chinese string — Qwen's CJK token counts are characteristic).
  pure_code_checkable: false
  max_tokens: 128
  temperature: 0
  weight: 0.5
- id: knowledge-cutoff
  signal: knowledge-cutoff / recency probe
  prompt: What is the most recent Qwen flagship model you are aware of, and what is your training knowledge cutoff (month and year)? If unsure, say 'unknown'.
  native_expected: A genuine mid-2026 Qwen (qwen3.7-max / qwen3.5) should be aware of the Qwen3 generation and not claim a 2021/2023 cutoff; Alibaba does not publish exact cutoffs so 'unknown'/'early 2026'-style answers are acceptable. It should NOT claim to be a 2023-era model if labeled as a 2026 flagship.
  downgrade_signal: Model asserts a 2021/2023 cutoff or has no knowledge of Qwen2.5/Qwen3 while being sold as a 2026 flagship, or describes itself with another vendor's cutoff language (e.g. 'my training data goes up to 2023, I am GPT...').
  pure_code_checkable: false
  expect_not_contains:
  - GPT
  - OpenAI
  - Claude
  - Anthropic
  - Gemini
  max_tokens: 128
  temperature: 0
  weight: 0.5
relay_red_flags:
- Model labeled 'qwen-max' but accepts >32K-token prompts or returns >8192 completion tokens — the 2.5-gen qwen-max is capped at 32K context / 8K output, so this indicates a different backend.
- Model labeled qwen3.5/qwen3-coder (native 65536 max_output) but completion_tokens truncate at ~8192 or ~16384 — likely qwen-max-2.5 or qwen-turbo substituted underneath.
- Self-id returns ChatGPT/OpenAI, Claude/Anthropic, Gemini/Google, Llama, Mistral, or DeepSeek instead of Qwen/通义千问/Alibaba.
- enable_thinking is ignored or 400s, or no separate reasoning_content channel is ever returned for a model sold as qwen3/qwq/thinking — native Qwen reasoning is a separate field, not inline <think> tags on the compat path. (reasoning_content channel handled by a dedicated detector.)
- 'qwen-plus and qwen3.5-plus behave identically w.r.t. default thinking (native: qwen3.5-plus thinks by default, commercial qwen-plus does not) — implies both map to one backend. (Requires a paired two-model probe, not the generic runner.)'
- response_format json_object succeeds even when no 'json' keyword is in messages — native DashScope 400s in that case; success implies a non-DashScope (e.g. OpenAI) backend. (API-level parameter-rejection probe, handled by a dedicated detector.)
- Strict json_schema returns clean JSON while thinking is enabled — native Qwen forbids structured output in thinking mode. (Bespoke combination probe, not the generic runner.)
- tools=[...] combined with stream=true succeeds without error on a Qwen model that natively forbids the combination — re-wrapped backend. (Scope to specific model id; API-level probe.)
- Stark Chinese-language degradation or China-centric factual errors (节气 order, 红楼梦 authorship, claiming a non-Alibaba maker) for a model that should be China-first.
- CJK prompt_tokens for a fixed Chinese string deviate from the recorded native Qwen tiktoken baseline (different tokenizer underneath). (Deterministic via usage.prompt_tokens — handled by a dedicated token-count detector.)
- qwen-long that cannot accept the DashScope fileid:// reference / file-extract upload workflow. (API-level capability probe.)
- Endpoint domain is not *.aliyuncs.com AND latency/headers/error-message wording differ from DashScope's known responses (e.g. OpenAI-style 'invalid_request_error' bodies instead of DashScope's code/message/request_id envelope).
