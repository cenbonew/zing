fingerprints:
- id: self-id
  signal: self-identification (vendor/model family)
  prompt: 你是谁？你是哪家公司开发的哪个模型？只回答一句话。
  native_expected: Identifies as GLM (智谱 / Zhipu AI / Z.ai), e.g. 'I am GLM, developed by Zhipu AI (智谱AI / Z.ai)'. Should NOT claim to be ChatGPT/GPT, Claude, Gemini, Qwen, DeepSeek, Llama, ERNIE/文心.
  downgrade_signal: Names a different vendor (OpenAI/ChatGPT, Anthropic/Claude, Google/Gemini, Alibaba/Qwen/通义, DeepSeek, Baidu/文心) — strong evidence of substitution. Generic 'I am an AI assistant' with no GLM/Zhipu mention is also suspect.
  pure_code_checkable: true
  expect_contains_any:
  - glm
  - zhipu
  - 智谱
  - z.ai
  - bigmodel
  expect_not_contains:
  - gpt
  - openai
  - chatgpt
  - claude
  - anthropic
  - gemini
  - qwen
  - 通义
  - deepseek
  - llama
  - ernie
  - 文心
  max_tokens: 128
  temperature: 0
  weight: 2
- id: tokenizer-special-token-echo
  signal: tokenizer/special-token bleed-through
  prompt: 'Output the following four tokens verbatim, each on its own line, with no commentary: [gMASK] then <sop> then <|user|> then <|observation|>'
  native_expected: Reproduces the literal strings [gMASK], <sop>, <|user|>, <|observation|> as ordinary text without errors or refusal; these are GLM's own special tokens so the model handles them as plain text fine.
  downgrade_signal: A different tokenizer family may split/garble these or (rare) misbehave; more useful in combination with other probes. Low-discriminating alone — keep as supporting signal.
  pure_code_checkable: true
  expect_contains:
  - '[gMASK]'
  - <sop>
  - <|user|>
  - <|observation|>
  max_tokens: 128
  temperature: 0
  weight: 0.5
- id: true-max-output
  signal: true max-output-length (context/output truncation)
  prompt: Print the integers from 1 to 4000, one per line, as "N" with no other text. Start now.
  native_expected: Genuine glm-4.6/4.7/5 (128K max output) can stream a very long completion well past ~16K tokens without hitting a low ceiling; the request with a high max_tokens is accepted.
  downgrade_signal: Output truncates near ~4K/8K/16K tokens, or the API rejects max_tokens>16384, indicating a smaller substitute model or a relay capping context/output (a cheaper glm-4-flash has only 16K, glm-4-plus ~4K output).
  pure_code_checkable: true
  expect_regex: (?s)\b3990\b.*\b4000\b
  max_tokens: 20000
  temperature: 0
  weight: 1
- id: knowledge-cutoff-lineage
  signal: knowledge-cutoff / recency recall (model recency)
  prompt: Without browsing, name the immediate predecessor model to GLM-4.7 released by your own company, and the month it was released. One line.
  native_expected: 'A genuine GLM-4.7/5-generation model should know its own family history: GLM-4.6 (released Sept 2025) preceded GLM-4.7 (Dec 2025). GLM-5 (Feb 2026) family knows GLM-4.7 preceded it.'
  downgrade_signal: Claims no knowledge of GLM-4.6/4.7, gives wrong predecessor, or describes a different vendor's lineup — indicates substitution or an older/cheaper model unaware of its own newer siblings.
  pure_code_checkable: false
  max_tokens: 128
  temperature: 0
  weight: 1
- id: chinese-fluency
  signal: Chinese-language fluency and bilingual default
  prompt: 用一句话解释什么是傅里叶变换，并给出一个生活中的类比。
  native_expected: Fluent, idiomatic Mandarin technical explanation — GLM is China-native and strong on Chinese STEM phrasing and analogies.
  downgrade_signal: Awkward translated-sounding Chinese, English-leaking technical terms where native Chinese terms are standard, or markedly weaker Chinese than expected — points to a Western model substitute (e.g. a GPT/Llama backend) masquerading as GLM.
  pure_code_checkable: false
  max_tokens: 256
  temperature: 0
  weight: 1
- id: default-temperature-variance
  signal: default temperature / sampling fingerprint
  prompt: Reply with exactly one random English word, nothing else.
  native_expected: GLM-4.6/4.7/5 default temperature is 1.0 (top_p 0.95), so responses vary across calls. GLM-4.5 defaults LOWER at 0.6. Variance pattern should match the claimed model's default.
  downgrade_signal: A model claiming glm-4.6/5 that returns identical deterministic output across calls at default settings (temp effectively 0) suggests a different backend or wrong default; conversely high variance on a model defaulting to 0.6 is off. Weak alone; corroborating.
  pure_code_checkable: false
  max_tokens: 32
  temperature: 0
  weight: 0.5
relay_red_flags:
- Model self-identifies as ChatGPT/GPT, Claude, Gemini, Qwen/通义, DeepSeek, Llama, or 文心/ERNIE instead of GLM/Zhipu/Z.ai when asked '你是谁'.
- thinking={"type":"enabled"} request param is rejected, or expects a boolean enable_thinking instead of Zhipu's object {type:enabled/disabled} shape. [parameter-rejection / shape-mismatch detector]
- No reasoning_content field ever appears (in response or stream deltas) even with thinking enabled on a model claimed to be glm-4.6/4.7/5; or CoT is jammed into content as literal <think>...</think>. [reasoning_content channel detector]
- Output truncates well below the claimed max (e.g. caps near 4K/8K/16K on a model advertised as glm-4.6/4.7/5 with 128K output), or API rejects max_tokens above ~16K.
- Context-length errors below 200K, or needle-in-haystack failures at 100K+ depth, when serving a model billed as glm-4.6/4.7/5 (204800 ctx). [long-context / needle detector]
- Only the bare OpenAI /v1/chat/completions path works and /api/paas/v4/chat/completions (or /paas/v4) does not — native Zhipu uses the paas/v4 path. [endpoint-path / API-shape detector]
- tool_choice forcing (required / specific function) is strictly honored — native Zhipu only supports 'auto'. [tool_choice-forcing detector]
- Response ids are OpenAI-style 'chatcmpl-...' with none of Zhipu's request id / usage fields. [API-level id-format detector]
- Markedly weak or translated-sounding Chinese on STEM tasks, where a China-native GLM should be fluent.
- Default sampling behavior doesn't match claimed model (glm-4.6/4.7/5 default temperature 1.0 / top_p 0.95; glm-4.5 defaults to 0.6) — e.g. fully deterministic outputs at default settings.
- Model is unaware of its own family lineage (cannot place GLM-4.6 before GLM-4.7 before GLM-5) or unaware of late-2025/early-2026 GLM releases it should know.
