fingerprints:
- id: self-id
  signal: self-identification
  prompt: Who are you? State your exact model name and the company that trained you in one sentence. Do not include any disclaimer.
  native_expected: Identifies as Gemini, built/trained by Google (Google DeepMind). Will name the Gemini family; will not claim to be GPT, Claude, Llama, Qwen, or 'an OpenAI model'.
  downgrade_signal: Claims to be ChatGPT/GPT-4/GPT-5, Claude, Llama, Qwen, DeepSeek, or 'developed by OpenAI/Anthropic'; or generic 'I am a large language model' with no Google attribution.
  pure_code_checkable: true
  expect_contains_any:
  - Gemini
  - Google
  - DeepMind
  expect_not_contains:
  - GPT
  - OpenAI
  - ChatGPT
  - Claude
  - Anthropic
  - Llama
  - Qwen
  - DeepSeek
  - Mistral
  max_tokens: 128
  temperature: 0
  weight: 1
- id: knowledge-cutoff
  signal: knowledge cutoff date
  prompt: What is your training data knowledge cutoff? Answer with just the month and year, formatted as YYYY-MM, and nothing else.
  native_expected: January 2025, i.e. '2025-01' (consistent across Gemini 2.5 and all 3.x models).
  downgrade_signal: Returns a different cutoff such as 2023-04 (GPT-4), 2023-12, 2024-04, 2024-10 (Claude), 2024-06, or 'April 2024' etc., indicating a non-Gemini backend.
  pure_code_checkable: true
  expect_contains:
  - 2025-01
  expect_not_contains:
  - 2023-04
  - 2023-12
  - 2024-04
  - 2024-06
  - 2024-10
  max_tokens: 32
  temperature: 0
  weight: 1
- id: true-max-output
  signal: true max-output-length / context handling
  prompt: Output the integer sequence starting at 1, one number per line (1, 2, 3, ...), and continue without stopping until you are cut off. Do not summarize or stop early.
  native_expected: Streams a long monotonic sequence and terminates with finishReason='MAX_TOKENS'; the candidate token count approaches the requested maxOutputTokens up to the model ceiling of 65536 (native) — i.e. it can exceed the old 8192 ceiling of legacy models.
  downgrade_signal: finishReason='STOP' far below the cap, hard truncation near 4096/8192 tokens, or refusal — indicating a substituted/quantized model with a smaller real output ceiling than advertised.
  pure_code_checkable: true
  expect_regex: 1\s*\n\s*2\s*\n\s*3
  max_tokens: 65536
  temperature: 0
  weight: 1
- id: factual-recall-pro-size
  signal: factual recall distinguishing model size (Pro vs cheap substitute)
  prompt: 'In one line each, give the SHA-style short answer: (1) the 50th digit of pi after the decimal point, (2) the chemical formula of caffeine, (3) the ICAO airport code for Tromso, Norway. Format strictly as ''1: X | 2: Y | 3: Z''.'
  native_expected: 'Gemini Pro-tier answers all correctly: 1: 0, 2: C8H10N4O2, 3: ENTC. Maintains the exact requested ''n: value | ...'' format.'
  downgrade_signal: A small/quantized substitute hallucinates digits of pi, gives wrong caffeine formula, or wrong/invented ICAO code, and/or breaks the strict output format.
  pure_code_checkable: true
  expect_contains:
  - C8H10N4O2
  - ENTC
  max_tokens: 128
  temperature: 0
  weight: 1
- id: reasoning-trap-bat-ball
  signal: reasoning-vs-non-reasoning tell (multi-step trap)
  prompt: A bat and a ball cost $1.10 in total. The bat costs $1.00 more than the ball. How much does the ball cost? Reply with only the dollar amount, e.g. $0.05.
  native_expected: Gemini 3.x / 2.5 reasoning models answer $0.05 (correct after reasoning).
  downgrade_signal: Returns the intuitive-but-wrong $0.10 — typical of a small non-reasoning substitute masquerading as a thinking-capable Gemini.
  pure_code_checkable: true
  expect_contains:
  - '0.05'
  expect_not_contains:
  - '0.10'
  max_tokens: 64
  temperature: 0
  weight: 1
relay_red_flags:
- No thoughtSignature returned on functionCall parts for a model advertised as Gemini 3.x (3 Pro / 3 Flash / 3.5 Flash / 3.1 Pro), or no HTTP 400 when the signature is stripped on the follow-up turn — the single strongest tell that the backend is not native Gemini 3. (Handled by dedicated thought-signature detector, not the generic fingerprint runner.)
- 'Reasoning can be fully turned off on a Pro/3.x model: native generateContent with thinkingConfig.thinkingBudget=0 (or compat reasoning_effort:''none'') still yields usageMetadata.thoughtsTokenCount > 0 on Gemini 3 Pro / 2.5 Pro; a backend that honors ''none'' / always returns 0 thoughts on a Pro tier is not native Gemini. (Dedicated reasoning/thinkingConfig detector.)'
- usageMetadata missing thoughtsTokenCount (or it is always 0) while the model claims to be a thinking model.
- models.countTokens endpoint absent or erroring, or token counts that match OpenAI tiktoken cl100k/o200k instead of Gemini SentencePiece for the same string (e.g. 'strawberry hello hello hello 🍓🍓 こんにちは'). (Dedicated tokenizer/countTokens detector.)
- Self-ID as GPT/Claude/Llama/Qwen/DeepSeek, or knowledge cutoff that is not January 2025.
- Max output truncates near 4096/8192 with finishReason STOP instead of reaching toward the 65536 ceiling with MAX_TOKENS.
- OpenAI-compat layer rejects unknown params with a 400 'unknown/unsupported parameter' error (e.g. frobnicate_level / top_logprobs) — real Gemini silently ignores them; a 400 indicates a passthrough to a different OpenAI-compatible provider. (Dedicated parameter-rejection detector.)
- Serving a 200 response for discontinued ids gemini-2.0-flash / gemini-2.0-flash-lite after 2026-06-01 — Google returns 404/400; a 200 means silent routing to another live model (classic货不对板). (Dedicated discontinued-model detector.)
- Context window that accepts far fewer than ~1,048,576 input tokens (relay truncating context while advertising 1M), or that errors well before ~1M tokens.
- Response body shaped like raw OpenAI (choices[].message only) when hitting the NATIVE generateContent path that should return candidates[]/usageMetadata — indicates a translation shim over a non-Gemini backend.
- No safetyRatings array on native responses, or safety/refusal style that does not match Gemini's (Gemini returns finishReason SAFETY + blockReason rather than a free-text moralizing refusal).
