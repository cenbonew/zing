fingerprints:
- id: self-id
  signal: self-identification
  prompt: In one short sentence, who are you and which company created you? Answer in English.
  native_expected: 'Identifies as Kimi, created by Moonshot AI (月之暗面). Genuine system-prompted form: ''You are Kimi, an AI assistant created by Moonshot AI.'''
  downgrade_signal: Claims to be GPT/ChatGPT (OpenAI), Claude (Anthropic), Gemini (Google), Qwen, DeepSeek, or a generic 'large language model' with no Moonshot/Kimi attribution — strong evidence of a substituted backend.
  pure_code_checkable: true
  expect_contains_any:
  - Kimi
  - Moonshot
  - 月之暗面
  expect_not_contains:
  - GPT
  - OpenAI
  - ChatGPT
  - Claude
  - Anthropic
  - Gemini
  - Qwen
  - DeepSeek
  - Llama
  max_tokens: 128
  temperature: 0
  weight: 2
- id: knowledge-cutoff
  signal: knowledge-cutoff / factual recall
  prompt: What is the most recent event or fact you are confident about? State the approximate month and year of your knowledge cutoff, and name your own model version (e.g. K2.5, K2.6).
  native_expected: K2.6/K2.5 cluster knowledge around early-to-mid 2025 (commonly cited ~April 2025) and, if grounded, will name itself as a K2-series Moonshot model. Plausibly knows 2024-early-2025 events.
  downgrade_signal: States a cutoff of 2021/2022/2023 (typical of older GPT-3.5/Llama-2-class substitutes), or confidently names itself as a non-Kimi model, or has no knowledge past 2023 — indicates a cheaper/older substituted backend.
  pure_code_checkable: false
  expect_not_contains:
  - '2021'
  - '2022'
  - '2023'
  max_tokens: 256
  temperature: 0
  weight: 1
- id: tokenizer-cjk-echo
  signal: tokenizer artifact (CJK / vocab)
  prompt: 'Repeat this exact string back verbatim, then on a new line state how many tokens it was for you: 月之暗面Kimi开放平台🌙'
  native_expected: Moonshot's ~160K-vocab BPE handles mixed CJK + emoji efficiently; verbatim echo is exact. Token counts reported are consistent with Moonshot's tokenizer (and the /tokenizers/estimate-token-count or usage.prompt_tokens endpoint can corroborate).
  downgrade_signal: Corrupted/garbled CJK or emoji in the echo (mojibake), or self-reported token counts grossly inconsistent with Moonshot's tokenizer, suggests a different tokenizer/model. Best cross-checked against usage.prompt_tokens from the same request.
  pure_code_checkable: true
  expect_contains:
  - 月之暗面
  - Kimi
  - 开放平台
  - 🌙
  max_tokens: 128
  temperature: 0
  weight: 1
- id: max-output
  signal: max-output-length
  prompt: Output the integers from 1 to 5000, one per line, with no commentary. Do not stop early.
  native_expected: K2.6 can produce long outputs (default cap 32768 output tokens; counting to 5000 fits within budget if max_tokens high enough). Completes or runs to the configured large cap.
  downgrade_signal: Hard stop near 4096 tokens (the legacy moonshot-v1 default output cap) when billed as K2.6 indicates routing to a legacy/cheaper model. An API error rejecting max_tokens=40000 as too large also flags a smaller backend.
  pure_code_checkable: true
  expect_regex: \b5000\b
  max_tokens: 40000
  temperature: 0
  weight: 1
- id: chinese-competence
  signal: refusal/format style (Chinese language competence)
  prompt: 用中文回答:请简要介绍你自己,并说明你的训练截止时间。
  native_expected: Fluent native Chinese response (Moonshot is a China-origin lab; Chinese is first-class), self-identifies as Kimi / 月之暗面 Moonshot AI, comfortable bilingual handling.
  downgrade_signal: Awkward/translated-feeling Chinese, refusal to use Chinese, or self-identifying as a Western model (ChatGPT/Claude) in the Chinese reply — signals a substituted non-Kimi backend.
  pure_code_checkable: false
  expect_contains_any:
  - Kimi
  - 月之暗面
  - Moonshot
  expect_not_contains:
  - ChatGPT
  - OpenAI
  - Claude
  - Anthropic
  - Gemini
  max_tokens: 256
  temperature: 0
  weight: 1
relay_red_flags:
- Model self-identifies as GPT/Claude/Gemini/Qwen/DeepSeek instead of Kimi / Moonshot AI when billed as a Moonshot model
- Billed as kimi-k2.6 but NEVER returns a reasoning_content field (thinking is on by default for K2.6) — suggests routing to a non-reasoning or non-Kimi model [reasoning_content channel detector]
- context_length_exceeded errors well below the advertised 256K (e.g. fails past 8k/32k/128k) on a model sold as K2.6/K2.5 — silent downgrade to moonshot-v1-* or smaller [long-context/needle detector]
- Hard output truncation near 4096 tokens when billed as K2.6 (legacy moonshot-v1 default cap) — wrong/cheaper backend
- tool_call ids never follow the native functions.{name}:{idx} pattern AND no Kimi special-token artifacts ever appear — combined with non-Kimi self-id, points to a foreign backend [tool-call inspection detector]
- Raw native special tokens <|tool_calls_section_begin|>, <|tool_call_begin|>, <|tool_call_argument_begin|> leaking into content/reasoning_content (a real Kimi-stack bug — confirms Kimi weights but a misconfigured relay)
- 'Ignores or errors on Moonshot-specific features: partial:true prefill mode, thinking parameter, prompt_cache_key — a generic OpenAI relay faking Moonshot [parameter-handling detector]'
- Self-reported knowledge cutoff in 2021-2023 when K2.x clusters around early-2025 — older substituted model
- Mojibake/garbled CJK or emoji output, or usage.prompt_tokens wildly inconsistent with Moonshot's ~160K-vocab tokenizer — different tokenizer/model
- Serving the deprecated kimi-k2-thinking / kimi-k2-0905-preview / kimi-latest weights while billing the newer kimi-k2.6 (cheaper retired model substituted for current flagship)
- temperature=0 greedy determinism with full thinking on a model billed K2.6, contradicting Moonshot's documented fixed temperature 1.0 thinking behavior [parameter-handling detector]
- 'Cross-region key confusion: a .cn-only key working against api.moonshot.ai (or vice versa) implies a proxy is re-keying upstream rather than passing through the native endpoint'
- Total inability to emit a tool call when tool_choice='required' on a model billed as K2.x — strong downgrade flag [tool-call inspection detector]
- Loses track of the counter, stops early, or narrates instead of calling tools across a long multi-step tool loop (K2.x documented stable across 200-300 consecutive tool calls) [long-horizon agentic detector]
