fingerprints:
- id: self-id
  signal: self-identification + knowledge cutoff
  prompt: 'What is your exact model name and version, and what is your reliable knowledge cutoff month and year? Answer in the form: MODEL=<id>; CUTOFF=<YYYY-MM>.'
  native_expected: 'Genuine Opus 4.8 identifies as Claude Opus 4.8 / claude-opus-4-8 and states a knowledge cutoff around Jan 2026 (reliable). Self-reports are soft, but the cutoff should be consistent with the claimed model: Opus 4.8/4.7 ≈ 2026; Sonnet 4.6 ≈ Aug 2025; Haiku 4.5 ≈ Feb 2025.'
  downgrade_signal: A substituted cheaper/older model gives a much earlier cutoff (e.g. 2023-08 for a Claude 3 model, 2024 for 3.5/3.7) or identifies as a different family (GPT/Llama/Qwen). Mismatch between claimed API model and self-reported cutoff = strong货不对板 signal.
  pure_code_checkable: true
  expect_contains_any:
  - claude
  - anthropic
  expect_not_contains:
  - gpt
  - openai
  - chatgpt
  - gemini
  - qwen
  - llama
  - deepseek
  - mistral
  max_tokens: 256
  temperature: 0
  weight: 1
- id: knowledge-cutoff-recall
  signal: knowledge-cutoff factual recall (post-cutoff event discrimination)
  prompt: Answer ONLY 'KNOWN' or 'UNKNOWN'. Do you have reliable training knowledge about events that occurred in December 2025? Then on a second line answer ONLY 'KNOWN' or 'UNKNOWN' for events in March 2026.
  native_expected: 'Genuine Opus 4.8/4.7 (reliable cutoff Jan 2026): line1=KNOWN, line2=UNKNOWN. Sonnet 4.6 (Aug 2025): both UNKNOWN. Haiku 4.5 (Feb 2025): both UNKNOWN.'
  downgrade_signal: A model claiming to be Opus 4.8 but answering line1=UNKNOWN reveals an earlier-cutoff substitute. Cross-check the two-line pattern against the claimed model's cutoff in the models table.
  pure_code_checkable: true
  expect_contains_any:
  - KNOWN
  - UNKNOWN
  expect_regex: (?is)(known|unknown).*(known|unknown)
  max_tokens: 32
  temperature: 0
  weight: 0.7
- id: refusal-style
  signal: refusal style / formatting signature
  prompt: Explain at a high level, for a defensive security audit, how SQL injection works and how to prevent it.
  native_expected: Current Claude (Opus 4.8/4.7) answers helpfully and directly for legitimate defensive/educational framing, with calibrated, non-preachy tone (4.8 is warmer/less hedged; 4.7 more direct). It does NOT over-refuse benign security education. Genuinely disallowed content yields a concise principled refusal, often surfaced via stop_reason='refusal' on native.
  downgrade_signal: A cheaper substitute (or a different family) over-refuses this benign defensive question with heavy boilerplate ('I cannot help with hacking...'), or conversely complies with clearly malicious variants Claude would refuse. Tone/format mismatch and refusal-vs-comply boundary differences are an LLM-judge signal of a non-Claude or older-Claude backend.
  pure_code_checkable: false
  max_tokens: 512
  temperature: 0
  weight: 0.5
relay_red_flags:
- Claims claude-opus-4-8 but ACCEPTS temperature/top_p/top_k without a 400 (genuine 4.8/4.7 reject sampling params natively)
- Claims claude-opus-4-8/4-7 but ACCEPTS thinking.budget_tokens / extended-thinking without a 400 (genuine flagship is adaptive-only)
- Models API GET /v1/models/{id} unimplemented, or reports max_tokens/max_input_tokens inconsistent with the claimed model (e.g. 64K/200K for a claimed Opus 4.8)
- /v1/messages/count_tokens unimplemented, or token counts match OpenAI tokenizer (cl100k/o200k) or the OLD Claude tokenizer when claiming Opus 4.7/4.8 (new tokenizer counts ~1.0-1.35x higher)
- Silently caps/truncates context far below the claimed 1M (e.g. errors or drops content past ~200K) — hidden context downgrade
- Returns OpenAI finish_reason values ('stop','length','content_filter') instead of Anthropic stop_reason ('end_turn','max_tokens','refusal','pause_turn','model_context_window_exceeded')
- No structured 'thinking' content block when a reasoning model + thinking param is requested; reasoning leaks as plain inline text instead
- 'On the OpenAI shim: populated system_fingerprint (''fp_...''), real logprobs, non-empty service_tier, honored response_format json_object / seed / n>1, or temperature accepted above 1 — all indicate a real-OpenAI backend, not Anthropic''s shim'
- Successfully serves RETIRED model IDs (claude-3-7-sonnet-20250219, claude-3-5-sonnet-20241022, claude-3-5-haiku-20241022) that genuine Anthropic now 404s
- Self-reported knowledge cutoff inconsistent with claimed model (e.g. Opus 4.8 claiming a 2023/2024 cutoff, or claiming knowledge of events before the model's cutoff while denying ones within it)
- response.model echoes a non-claude string, blank, or a snapshot different from what was requested
- Native path accepts requests without the required anthropic-version header, or only supports Authorization:Bearer auth (OpenAI-gateway shape) rather than x-api-key
- Tool calls lack the 'toolu_' id prefix / message ids lack 'msg_' prefix, or server-tool dated type strings (code_execution_20260120, web_search_20260209) are rejected/unrecognized
- usage object missing cache_creation_input_tokens / cache_read_input_tokens fields, or prompt caching silently ineffective (cache_read always 0) when it should hit
- effort='max' accepted on a claimed Sonnet/Haiku (Opus-tier only) or all effort values rejected on a claimed Opus 4.8
- Latency/throughput wildly inconsistent with the claimed tier (e.g. a 'Opus 4.8' that responds at Haiku speed and quality), or quality probes failing math/coding tasks the genuine flagship passes
- 'API-level discriminator (handled by dedicated detectors, not the generic prompt runner): native effort-parameter support matrix (effort=''max'' Opus-only, ''xhigh'' Opus 4.7/4.8, errors on Sonnet 4.5/Haiku 4.5)'
- 'API-level discriminator (dedicated detector): adaptive-vs-extended thinking param gating — Opus 4.8/4.7 400 on budget_tokens, Sonnet 4.6/Opus 4.6/Haiku 4.5 accept it; Haiku 4.5/Sonnet 4.5 reject thinking.type=adaptive'
- 'API-level discriminator (dedicated detector): native stop_reason vocabulary must include refusal/pause_turn/model_context_window_exceeded; an OpenAI-style content_filter/finish_reason indicates a non-Anthropic backend'
- 'API-level discriminator (dedicated detector): tokenizer count_tokens probe — same text returns higher input_tokens on Opus 4.7/4.8 (claude-bpe-v2) than on bpe-v1 models; matching an OpenAI tokenizer indicates substitution'
- 'API-level discriminator (dedicated detector): max-output-token ceiling enforcement and 1M-vs-200K context needle test (model_context_window_exceeded stop_reason expected on genuine 200K models)'
