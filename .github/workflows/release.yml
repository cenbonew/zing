name: Release to PyPI

# Publishes zing-audit to PyPI on a version tag (v*), using PyPI Trusted
# Publishing (OIDC) — no API token is stored as a secret.
#
# ONE-TIME SETUP on PyPI (https://pypi.org/manage/account/publishing/):
#   Add a "pending publisher" for project `zing-audit` with:
#     Owner:            cenbonew
#     Repository name:  zing
#     Workflow name:    release.yml
#     Environment name: pypi
# After the first successful publish the project becomes a normal Trusted Publisher.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: python -m pip install --upgrade build && python -m build
      - name: Check metadata
        run: python -m pip install --upgrade twine && twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zing-audit
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
