# Example consumer workflow for the `zing relay audit` composite action.
#
# Copy this into your own repo (or use the action directly from cenbonew/zing).
# It runs a relay health audit on a daily schedule and on demand, then gates a
# follow-up step on the result. The relay key comes from a repository secret —
# create one named RELAY_API_KEY under Settings → Secrets and variables → Actions.
name: Relay audit

on:
  schedule:
    # 06:00 UTC every day. Adjust to taste.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      fail-on-risk:
        description: "Fail the run when risk >= this level."
        required: false
        default: "high"
        type: choice
        options: ["low", "medium", "high"]

permissions:
  contents: read

jobs:
  audit:
    name: Audit relay
    runs-on: ubuntu-latest
    steps:
      - name: Audit the relay
        id: zing
        # Pin to a release tag for reproducible, supply-chain-safe runs.
        uses: cenbonew/zing@v0.8.0
        with:
          base-url: https://relay.example.com/v1
          api-key: ${{ secrets.RELAY_API_KEY }}
          model: gpt-4o
          claimed-model: gpt-4o
          declared-provider: openai
          suite: standard
          fail-on-risk: ${{ inputs.fail-on-risk || 'high' }}
          # version: zing-audit==0.8.0   # optional: pin the CLI too

      - name: Show the verdict
        # `always()` so this still reports even when the gate above failed.
        if: always()
        run: |
          echo "risk=${{ steps.zing.outputs.risk }}"
          echo "score=${{ steps.zing.outputs.score }}"
          echo "rating=${{ steps.zing.outputs.rating }}"
