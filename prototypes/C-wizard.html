<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>zing — 一键检测中转站</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#eef2ec; --bg2:#e4ebe2;
    --card:#fffefb; --ink:#0c211e; --ink2:#5a6b66; --faint:#9aa7a2;
    --line:#e6ece5;
    --teal:#0f6f5f; --teal-d:#0a4a40; --mint:#bff0c9;
    --lime:#c7f25a; --coral:#ff6a4d; --amber:#f6b73c; --sky:#5bb6e8;
    --disp:"Clash Display","Satoshi",system-ui,sans-serif;
    --sans:"Satoshi",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(680px 480px at 50% -8%, #f4fbef 0%, transparent 60%),
      radial-gradient(700px 700px at 108% 112%, #dceee2 0%, transparent 55%),
      var(--bg);
    display:flex;align-items:center;justify-content:center;padding:30px 16px;min-height:100vh}
  .app{width:100%;max-width:560px}

  .brand{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:18px}
  .brand .b{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--ink);color:var(--lime);
    font-family:var(--disp);font-weight:700;font-size:17px;box-shadow:0 8px 22px -10px var(--teal)}
  .brand .nm{font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:-.4px}
  .brand .nm b{color:var(--teal)}

  /* stepper */
  .steps{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
  .steps .s{display:flex;align-items:center;gap:8px}
  .steps .d{width:9px;height:9px;border-radius:50%;background:#cdd8d1;transition:.3s}
  .steps .d.on{background:var(--teal);transform:scale(1.25)}
  .steps .d.done{background:var(--ink)}
  .steps .ln{width:26px;height:2px;background:#cdd8d1;border-radius:2px}

  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:26px;
    box-shadow:0 30px 70px -40px rgba(15,60,50,.45), 0 2px 0 #fff inset;overflow:hidden}
  .pane{display:none;padding:30px 28px 26px}
  .pane.show{display:block;animation:swap .45s cubic-bezier(.2,.85,.25,1)}
  @keyframes swap{from{opacity:0;transform:translateY(10px) scale(.99)}}
  @media(max-width:480px){.pane{padding:24px 20px}}

  /* ---- step 1 ---- */
  h1{font-family:var(--disp);font-weight:600;font-size:30px;line-height:1.08;letter-spacing:-1px;margin:4px 0 0}
  h1 .u{background:linear-gradient(transparent 62%, var(--lime) 0);padding:0 3px}
  .sub{color:var(--ink2);font-size:15px;line-height:1.55;margin:12px 0 22px}
  .lab{font-size:12px;font-weight:700;letter-spacing:.4px;color:var(--faint);text-transform:uppercase;margin:0 0 7px}
  .in{width:100%;border:1.5px solid var(--line);background:#fbfdfa;border-radius:14px;font-family:var(--sans);
    font-weight:500;font-size:16px;color:var(--ink);padding:14px 15px;outline:none;transition:.16s}
  .in:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(15,111,95,.12);background:#fff}
  .grp{margin-bottom:15px}
  .chips{display:flex;gap:9px;margin:4px 0 22px}
  .chip{flex:1;cursor:pointer;border:1.5px solid var(--line);border-radius:16px;padding:13px 14px;background:#fbfdfa;transition:.16s}
  .chip:hover{border-color:#cfe0d6}
  .chip.on{border-color:var(--teal);background:#f0f8f3}
  .chip .ico{font-size:20px}
  .chip .t{font-family:var(--disp);font-weight:600;font-size:14px;margin-top:6px}
  .chip .d{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.4}
  .chip.bad.on{border-color:var(--coral);background:#fff3f0}

  .cta{width:100%;border:0;border-radius:16px;padding:16px;cursor:pointer;font-family:var(--disp);font-weight:600;
    font-size:17px;color:#fff;background:var(--ink);transition:.16s;display:flex;align-items:center;justify-content:center;gap:8px}
  .cta:hover{background:var(--teal)} .cta:active{transform:translateY(1px)}
  .cta .arr{transition:.2s} .cta:hover .arr{transform:translateX(4px)}
  .reassure{text-align:center;font-size:12.5px;color:var(--faint);margin-top:14px}
  .reassure b{color:var(--ink2)}

  /* ---- step 2 scanning ---- */
  .scan{text-align:center;padding:12px 0 6px}
  .radar{position:relative;width:188px;height:188px;margin:8px auto 4px}
  .radar .ripple{position:absolute;inset:0;border-radius:50%;border:2px solid var(--teal);opacity:0;animation:rip 2.4s ease-out infinite}
  .radar .ripple:nth-child(2){animation-delay:.8s}.radar .ripple:nth-child(3){animation-delay:1.6s}
  @keyframes rip{0%{transform:scale(.3);opacity:.5}100%{transform:scale(1);opacity:0}}
  .radar .core{position:absolute;inset:34%;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--teal),var(--teal-d));
    display:grid;place-items:center;color:var(--lime);font-family:var(--disp);font-weight:700;font-size:26px;
    box-shadow:0 14px 34px -12px var(--teal)}
  .radar .sweep{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg, transparent 0 300deg, rgba(15,111,95,.28) 350deg, transparent 360deg);animation:sp 1.5s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .scan h2{font-family:var(--disp);font-weight:600;font-size:21px;margin:14px 0 2px}
  .scan .now{color:var(--teal);font-weight:700;font-size:14px;min-height:20px}
  .ticks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:18px}
  .tk{font-size:11.5px;font-weight:600;color:var(--faint);background:#f2f6f1;border-radius:999px;padding:5px 11px;transition:.25s;opacity:.55}
  .tk.done{color:var(--teal);background:#e8f4ec;opacity:1}
  .tk.done::before{content:"✓ "}

  /* ---- step 3 result ---- */
  .result{text-align:center}
  .ring{position:relative;width:150px;height:150px;margin:2px auto 6px}
  .ring svg{transform:rotate(-90deg)}
  .ring .mid{position:absolute;inset:0;display:grid;place-content:center}
  .ring .mid b{font-family:var(--disp);font-weight:700;font-size:42px;line-height:1}
  .ring .mid span{font-size:12px;color:var(--faint);font-weight:600}
  .vpill{display:inline-flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:600;font-size:15px;
    padding:8px 16px;border-radius:999px;margin-top:4px}
  .result h2{font-family:var(--disp);font-weight:600;font-size:22px;letter-spacing:-.4px;margin:14px 0 0;line-height:1.2}
  .result p{color:var(--ink2);font-size:14.5px;line-height:1.6;margin:10px 0 0;text-align:left}
  .callout{text-align:left;margin-top:16px;border-radius:16px;padding:14px 16px;font-size:14px;line-height:1.55}
  .callout.bad{background:#fff2ef;border:1px solid #ffd9d0}
  .callout.good{background:#eff8f2;border:1px solid #cfeBd9}
  .callout .q{font-family:var(--disp);color:var(--coral);font-weight:600}
  .callout.good .q{color:var(--teal)}

  .toggle{margin-top:16px;width:100%;background:#f4f7f3;border:1px solid var(--line);border-radius:14px;padding:13px;
    font-family:var(--sans);font-weight:700;font-size:14px;color:var(--ink2);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .toggle .cv{transition:.25s}
  .details{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.2,.8,.2,1)}
  .dimgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 0 4px}
  @media(max-width:440px){.dimgrid{grid-template-columns:1fr}}
  .dchip{text-align:left;border:1px solid var(--line);border-radius:13px;padding:10px 12px}
  .dchip .top{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700}
  .dchip .top .v{font-family:var(--disp)}
  .dchip .ba{height:5px;border-radius:4px;background:#eef2ec;margin-top:8px;overflow:hidden}
  .dchip .ba i{display:block;height:100%;width:0;border-radius:4px;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .btns{display:flex;gap:10px;margin-top:18px}
  .btns button{flex:1;border-radius:14px;padding:13px;font-family:var(--disp);font-weight:600;font-size:14px;cursor:pointer;border:1.5px solid var(--line);background:#fbfdfa;color:var(--ink)}
  .btns button.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
  .foot{text-align:center;color:var(--faint);font-size:12px;margin-top:18px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="brand"><span class="b">⚡</span><span class="nm">zing<b>.</b></span></div>
  <div class="steps" id="stepper">
    <div class="s"><span class="d on" data-i="1"></span></div><span class="ln"></span>
    <div class="s"><span class="d" data-i="2"></span></div><span class="ln"></span>
    <div class="s"><span class="d" data-i="3"></span></div>
  </div>

  <div class="card">
    <!-- STEP 1 -->
    <section class="pane show" id="p1">
      <h1>这家中转站，<br>给的是<span class="u">真货</span>吗？</h1>
      <p class="sub">填两样东西，30 秒出一份能看懂的结论。无需懂代码。</p>
      <div class="grp"><div class="lab">中转站地址</div><input class="in" id="i-url" value="https://api.deepseek.com/v1"></div>
      <div class="grp"><div class="lab">它声称的模型</div><input class="in" id="i-model" value="deepseek-v4-flash"></div>
      <div class="lab">先用示例体验</div>
      <div class="chips">
        <div class="chip on" data-s="honest"><div class="ico">🟢</div><div class="t">诚实端点</div><div class="d">DeepSeek 官方</div></div>
        <div class="chip bad" data-s="fake"><div class="ico">🔴</div><div class="t">货不对板</div><div class="d">豆包冒充 DeepSeek</div></div>
      </div>
      <button class="cta" id="start">开始检测 <span class="arr">→</span></button>
      <div class="reassure">🔒 检测在你本地发起，<b>不经手、不上传</b>你的 API 密钥</div>
    </section>

    <!-- STEP 2 -->
    <section class="pane" id="p2">
      <div class="scan">
        <div class="radar">
          <div class="ripple"></div><div class="ripple"></div><div class="ripple"></div>
          <div class="sweep"></div><div class="core">⚡</div>
        </div>
        <h2>正在体检…</h2>
        <div class="now" id="now">连接端点</div>
        <div class="ticks" id="ticks"></div>
      </div>
    </section>

    <!-- STEP 3 -->
    <section class="pane" id="p3">
      <div class="result">
        <div class="ring">
          <svg width="150" height="150"><circle cx="75" cy="75" r="66" stroke="#eef2ec" stroke-width="11" fill="none"/>
          <circle id="ring" cx="75" cy="75" r="66" stroke-width="11" fill="none" stroke-linecap="round"
            stroke-dasharray="414.7" stroke-dashoffset="414.7" style="transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)"/></svg>
          <div class="mid"><b id="r-score">—</b><span>/ 100</span></div>
        </div>
        <div class="vpill" id="r-pill">—</div>
        <h2 id="r-head">—</h2>
        <p id="r-sum">—</p>
        <div class="callout" id="r-callout" style="display:none"></div>

        <button class="toggle" id="tg">查看逐项体检（9 项）<span class="cv">⌄</span></button>
        <div class="details" id="det"><div class="dimgrid" id="dimgrid"></div></div>

        <div class="btns">
          <button id="again">再测一个</button>
          <button class="pri">下载报告</button>
        </div>
        <div class="foot">zing 给出的是风险与偏离的可复现证据，不是法律结论。<br>建议对照官方基线复检后再下定论。</div>
      </div>
    </section>
  </div>
</div>

<script>
const DATA={
  honest:{ score:94, cls:"good", pillBg:"#e8f4ec", pillC:"#0f6f5f", ringC:"#0f6f5f",
    pill:"✓ 大概率是真货", head:"行为与所声称的模型一致",
    sum:"九大维度没发现明显猫腻——它的自我介绍、长文记忆、能力支持都和 deepseek-v4-flash 的原生表现对得上。你买到的，大概率就是它本身。",
    callout:{cls:"good",html:'问它「你是谁」，它老实回答：<span class="q">我是 DeepSeek-V4（深度求索）</span>，没有冒充别家。'},
    dims:[["模型身份",100],["上下文窗口",96],["能力声明",90],["计费用量",92],["协议兼容",88],["连通性",95],["并发可靠",100],["流式真实",100],["传输安全",100]] },
  fake:{ score:21, cls:"bad", pillBg:"#ffe9e4", pillC:"#d6452c", ringC:"#ff6a4d",
    pill:"✕ 货不对板", head:"它给的并不是 DeepSeek",
    sum:"这家声称提供 deepseek-v4-pro，但一问身份，它自报是字节跳动的「豆包」；而且能记住的长文长度、支持的能力都和 DeepSeek 对不上。强烈建议别用它跑 DeepSeek 的活。",
    callout:{cls:"bad",html:'问它「你是谁」，它说漏了嘴：<span class="q">"I\'m Doubao, an AI assistant developed by ByteDance."</span> —— 你买的是 DeepSeek，给的却是豆包。'},
    dims:[["模型身份",20],["上下文窗口",35],["能力声明",55],["计费用量",100],["协议兼容",90],["连通性",100],["并发可靠",100],["流式真实",100],["传输安全",100]] }
};
const STEPS=["连接端点","核对身份","测长文记忆","验工具/JSON","查计费用量","看流式与安全","汇总结论"];
const TICKS=["连通","身份","上下文","能力","计费","流式","安全","可靠","完整性"];
const col=v=>v>=85?"#0f6f5f":v>=70?"#f6b73c":"#ff6a4d";
let cur="honest";
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];

$$(".chip").forEach(c=>c.onclick=()=>{
  cur=c.dataset.s; $$(".chip").forEach(x=>x.classList.remove("on")); c.classList.add("on");
  $("#i-url").value=cur==="honest"?"https://api.deepseek.com/v1":"https://relay.cheap-llm.example/v1";
  $("#i-model").value=cur==="honest"?"deepseek-v4-flash":"deepseek-v4-pro";
});

function goStep(n){
  $$(".pane").forEach(p=>p.classList.remove("show"));
  $("#p"+n).classList.add("show");
  $$("#stepper .d").forEach(d=>{const i=+d.dataset.i;d.classList.toggle("on",i===n);d.classList.toggle("done",i<n)});
}

$("#start").onclick=async()=>{
  goStep(2);
  $("#ticks").innerHTML=TICKS.map((t,i)=>`<span class="tk" id="tk${i}">${t}</span>`).join("");
  for(let i=0;i<STEPS.length;i++){
    $("#now").textContent=STEPS[i];
    await sleep(360+Math.random()*260);
    if(TICKS[i])$("#tk"+i)?.classList.add("done");
  }
  // mark remaining ticks done
  $$(".tk").forEach(t=>t.classList.add("done"));
  await sleep(280);
  showResult(DATA[cur]);
  goStep(3);
};

function showResult(d){
  $("#r-score").textContent=d.score; $("#r-score").style.color=d.ringC;
  const p=$("#r-pill"); p.textContent=d.pill; p.style.background=d.pillBg; p.style.color=d.pillC;
  $("#r-head").textContent=d.head; $("#r-sum").textContent=d.sum;
  const c=$("#r-callout"); c.style.display="block"; c.className="callout "+d.callout.cls; c.innerHTML=d.callout.html;
  $("#ring").style.stroke=d.ringC;
  $("#dimgrid").innerHTML=d.dims.map(([nm,v])=>`
    <div class="dchip"><div class="top"><span>${nm}</span><span class="v" style="color:${col(v)}">${v}</span></div>
    <div class="ba"><i data-w="${v}" style="background:${col(v)}"></i></div></div>`).join("");
  // reset details
  $("#det").style.maxHeight="0"; $("#tg").querySelector(".cv").style.transform="";
  requestAnimationFrame(()=>{
    $("#ring").style.strokeDashoffset = 414.7*(1-d.score/100);
  });
}
$("#tg").onclick=()=>{
  const det=$("#det"), open=det.style.maxHeight && det.style.maxHeight!=="0px";
  det.style.maxHeight=open?"0":det.scrollHeight+40+"px";
  $("#tg").querySelector(".cv").style.transform=open?"":"rotate(180deg)";
  if(!open) setTimeout(()=>$$("#dimgrid .ba i").forEach(i=>i.style.width=i.dataset.w+"%"),60);
};
$("#again").onclick=()=>goStep(1);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
</script>
</body>
</html>
