# Example zing config. Copy to ./zing.yaml and edit.
#   zing check -c zing.yaml
#   zing compare -c zing.yaml --suite deep

target:
  name: my-relay
  base_url: https://relay.example.com/v1
  api_key: env:ZING_API_KEY          # env:VAR | file:/path | raw literal
  model: gpt-4o
  declared_provider: openai          # optional; inferred from model id otherwise
  timeout_sec: 60
  headers: {}                        # extra HTTP headers if the relay needs them

# Trusted baseline for `zing compare` (an endpoint you trust to be genuine).
baseline:
  name: openai-official
  base_url: https://api.openai.com/v1
  api_key: env:OPENAI_API_KEY
  model: gpt-4o

run:
  suite: standard                    # smoke | standard | deep | full
  judge: false                       # set true to enable code+LLM hybrid judging
  output_dir: reports
  format: all                        # json | md | html | all
  reliability_requests: 8
  concurrency: 3
  max_context_probe_tokens: 200000   # cap so probing a 1M model stays affordable

# LLM judge backend (used only when run.judge is true). Defaults to `baseline`.
judge:
  base_url: https://api.openai.com/v1
  api_key: env:OPENAI_API_KEY
  model: gpt-4o-mini
